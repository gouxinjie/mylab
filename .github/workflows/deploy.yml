# ============================================================
# GitHub Actions：推送 master 分支后自动部署到阿里云 ECS
# 原理：Runner 先 checkout 完整代码（含 pnpm-lock.yaml），
#       通过 SCP 直接把代码传到 ECS，再在 ECS 上重建容器。
# 优势：ECS 无需访问 GitHub，不再依赖 Deploy key，lockfile 随代码一并传输。
# ============================================================
name: 部署到阿里云 ECS

on:
  # 推送 master 分支时自动触发
  push:
    branches: [master]
  # 允许在 Actions 页面手动触发
  workflow_dispatch:

jobs:
  deploy:
    name: 传输代码并重建容器
    runs-on: ubuntu-latest
    steps:
      # 步骤 1：Runner 本地检出完整仓库（含 pnpm-lock.yaml）
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤 2：通过 SCP 将代码传到 ECS（不再依赖 ECS 访问 GitHub）
      - name: 传输代码到 ECS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          # 可选：若首次连接报 host key 校验失败，用 `ssh-keyscan 主机IP` 生成后填入 ECS_HOST_KEY
          # host_key: ${{ secrets.ECS_HOST_KEY }}
          # 传输前清空目标目录，保证无残留旧文件
          rm: true
          # 复制仓库根目录全部内容（排除 .git 历史与 node_modules）
          source: "."
          target: "/var/www/mylab"
          exclude: ".git/,node_modules/"

      # 步骤 3：在 ECS 上重建并启动容器
      - name: 在 ECS 上重建容器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          # host_key: ${{ secrets.ECS_HOST_KEY }}
          script_stop: true
          script: |
            set -e
            cd /var/www/mylab
            docker compose up -d --build
            docker image prune -f
