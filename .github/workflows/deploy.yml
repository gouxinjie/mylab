# ============================================================
# GitHub Actions：推送 master 分支后自动部署到阿里云 ECS
# 原理：
#   1. Runner 检出完整代码（含 pnpm-lock.yaml）
#   2. 在 Runner 上 docker build 并推送镜像到 ghcr.io（构建不再发生在 ECS）
#   3. 通过 SCP 把运行时所需文件（nginx.conf / docker-compose.yml 等）传到 ECS
#   4. ECS 上 docker compose pull && up -d，仅拉取并运行，不再执行 next build
# 优势：ECS（仅 1.8G 内存）无需承担重型构建，彻底规避 OOM / swap 卡死问题。
# ============================================================
name: 部署到阿里云 ECS

on:
  # 推送 master 分支时自动触发
  push:
    branches: [master]
  # 允许在 Actions 页面手动触发
  workflow_dispatch:

# 授予推送镜像到 ghcr.io 的权限（GITHUB_TOKEN 需 packages: write）
# actions: read 供 docker/build-push-action 的 gha 缓存使用
permissions:
  contents: read
  packages: write
  actions: read

jobs:
  deploy:
    name: 构建镜像并部署
    runs-on: ubuntu-latest
    steps:
      # 步骤 1：Runner 本地检出完整仓库（含 pnpm-lock.yaml）
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤 2：登录 ghcr.io（使用内置 GITHUB_TOKEN，无需额外密钥）
      - name: 登录 ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 步骤 2.5：配置 buildx（使用 docker-container 驱动以支持 gha 缓存导出）
      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤 3：构建并推送镜像到 ghcr.io
      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # 镜像地址：ghcr.io/<owner>/<repo>:latest
          tags: ghcr.io/${{ github.repository }}:latest
          # 利用 GitHub Actions 缓存加速层复用
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 步骤 4：通过 SCP 把运行时所需文件传到 ECS（仅 nginx.conf 与 pull 版 docker-compose.yml，
      #         应用镜像由上方推送到 ghcr.io，ECS 无需源码）
      - name: 传输运行时文件到 ECS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          # 可选：若首次连接报 host key 校验失败，用 `ssh-keyscan 主机IP` 生成后填入 ECS_HOST_KEY
          # host_key: ${{ secrets.ECS_HOST_KEY }}
          # 传输前清空目标目录，保证无残留旧文件
          rm: true
          # 仅传输运行所需文件（应用镜像来自 ghcr.io，ECS 不再持有源码）
          source: "nginx.conf,docker-compose.yml"
          target: "/var/www/mylab"

      # 步骤 5：在 ECS 上拉取镜像并启动容器（不再 --build）
      # 增加超时与重试机制，防止 ECS 到 ghcr.io 网络波动导致部署失败
      - name: 在 ECS 上拉取并启动容器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          # host_key: ${{ secrets.ECS_HOST_KEY }}
          # 国内 ECS 拉取 ghcr.io 镜像较慢，单次 docker compose pull 可能超过 20 分钟，
          # 故放大超时：连接总超时 120m，单条命令超时 90m，避免被中途 kill
          timeout: 120m
          command_timeout: 90m
          script_stop: true
          script: |
            set -e
            cd /var/www/mylab
            # 重试 pull，应对国内 ECS 拉 ghcr.io 偶发慢速/超时
            for i in 1 2 3; do
              echo "[第${i}次] docker compose pull..."
              docker compose pull && break
              echo "[重试 ${i}/3] pull 失败，等待 30 秒后重试..."
              sleep 30
            done
            # 清理可能残留的孤儿容器（如服务改名后遗留的旧容器），避免其占用端口导致启动失败
            docker compose down --remove-orphans || true
            docker compose up -d
            docker image prune -f
