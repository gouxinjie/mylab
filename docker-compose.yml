version: "3.8"

services:
  ngingx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "3500:3500"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mylab
    ports:
      - "3500:3500"
    restart: always
    environment:
      - NODE_ENV=production
      - GITHUB_TOKEN=${GITHUB_TOKEN}
