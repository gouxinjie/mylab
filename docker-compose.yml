services:
  nginx:
    image: nginx:alpine
    # 按部署文档架构（docs/Next项目+Docker自动部署到ECS实战.md 2.1/3.4）：
    # 宿主机 80 端口由宿主 nginx 统一监听并托管多站点，本项目绝不抢占 80，
    # 仅把容器内 80 映射到宿主 3500，由宿主 nginx 反代 gouxinjie.com -> 127.0.0.1:3500。
    ports:
      - "3500:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: always

  app:
    # 应用镜像由 CI 构建并推送到 ghcr.io，ECS 仅拉取运行（详见 .github/workflows/deploy.yml）
    # 注意：此处必须使用 image 而非 build，否则 ECS 会回退到本地构建并因缺少 Dockerfile 失败
    image: ghcr.io/gouxinjie/mylab:latest
    container_name: mylab
    # Next.js standalone 的 server.js 以 process.env.HOSTNAME 作为监听地址，
    # 而 Docker 默认把 HOSTNAME 设为容器主机名（仅绑定容器 IP，非 0.0.0.0），
    # 导致容器内的 localhost 健康检查连接被拒。此处显式覆盖为 0.0.0.0 监听所有网卡，
    # 使 localhost（健康检查）与 nginx（app:3500）均可访问。
    command: sh -c "cd /app && HOSTNAME=0.0.0.0 exec node server.js"
    # app 仅在 docker 内网通过 3500 端口被 nginx 代理访问，不对外暴露宿主机端口，
    # 避免与 nginx 服务的 3500 映射冲突导致 "port is already allocated"
    expose:
      - "3500"
    # 覆盖镜像内的健康检查：使用真实 GET 请求（跟随重定向），避免 wget --spider 发送 HEAD
    # 在页面路由上偶发不稳定导致误判不健康
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3500/zh"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: always
    environment:
      - NODE_ENV=production
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
