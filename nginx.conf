# ============================================================
# Nginx 反向代理配置（供 docker-compose 挂载到 conf.d）
# 职责：gzip 压缩、将请求转发给 Next.js 容器
# 当前阶段：仅使用 HTTP（80），后续如需 HTTPS 再补充 443 server 段
# ============================================================

# 上游 Next.js 应用（compose 服务名 app，内部端口 3500）
upstream next_app {
    server app:3500;
}

# HTTP 服务
server {
    listen 80;
    server_name gouxinjie.com www.gouxinjie.com;

    # 开启 gzip，减小传输体积
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml application/xml+rss;

    # 反向代理所有请求到 Next.js
    location / {
        proxy_pass http://next_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 支持 WebSocket（如后续使用）
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
