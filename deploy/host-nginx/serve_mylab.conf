# ============================================================
# 宿主机（ECS）Nginx 站点配置 —— gouxinjie.com
# 作用：宿主机 nginx 监听 80，将全部请求转发到 Docker nginx 容器
#       （容器已把内部 80 映射到宿主机 3500）
# 数据流向：外网:80 → 宿主机 nginx → 127.0.0.1:3500 → Docker nginx(容器80) → app:3500
#
# 部署位置：/etc/nginx/conf.d/serve_mylab.conf
# 生效命令：nginx -t && nginx -s reload
# 当前阶段：仅 HTTP，后续启用 HTTPS 时再补充 443 server 段与证书
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name gouxinjie.com www.gouxinjie.com;

    # 访问日志（可选，按需保留）
    access_log /var/log/nginx/gouxinjie.access.log;
    error_log  /var/log/nginx/gouxinjie.error.log;

    # 上传大小限制（按需调整）
    client_max_body_size 20m;

    # 转发所有请求到 Docker nginx 容器（宿主机 3500）
    location / {
        proxy_pass http://127.0.0.1:3500;
        proxy_http_version 1.1;

        # 透传真实请求信息
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 支持 WebSocket（如后续使用）
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置（按需调整）
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
